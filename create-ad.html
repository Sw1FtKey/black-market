<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать объявление — Black Market</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body class="create-ad-body" style="overflow-x:hidden;">

<!-- Кнопка назад -->
<a href="index.html" class="back-button">← Назад</a>

<div class="create-ad-container">
    <h1 class="create-ad-title">Создать объявление</h1>

    <form id="createAdForm" class="create-ad-form">
        
        <!-- Категория -->
        <div class="form-group">
            <label>Категория</label>
            <select id="adCategory" required>
                <option value="">Выберите категорию</option>
                <option value="cars">Машины</option>
                <option value="houses">Дома</option>
                <option value="garages">Гаражи</option>
                <option value="business">Бизнесы</option>
                <option value="accessories">Аксессуары</option>
                <option value="skins">Скины</option>
                <option value="other">Разное</option>
            </select>
        </div>

        <!-- Название / Марка ТС -->
        <div class="form-group" id="titleGroup">
            <label>Название</label>
            <input type="text" id="adTitle" placeholder="Без продам! " required>
        </div>
        <!-- Выбор марки (только для категории cars) -->
        <div class="form-group hidden" id="carModelGroup">
            <label>Марка и модель ТС</label>
            <div style="position:relative;">
                <input type="text" id="carModelSearch" placeholder="Поиск: BMW, Toyota, Lada..." autocomplete="off"
                    style="width:100%;padding-right:36px;box-sizing:border-box;"
                    oninput="filterCarModels(this.value)">
                <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#888;z-index:1;">🔍</span>
                <div id="carModelDropdown" class="car-model-dropdown hidden"></div>
            </div>
            <input type="hidden" id="carModelValue">
            <div id="carModelSelected" class="car-model-selected hidden"></div>
        </div>

        <!-- Цена -->
        <div class="form-group">
            <label>Цена (₽)</label>
            <input type="number" id="adPrice" placeholder="500000" required>
        </div>

        <!-- Описание -->
        <div class="form-group">
            <label>Описание</label>
            <textarea id="adDescription" rows="4" placeholder="Опишите товар подробнее..."></textarea>
        </div>
        <!-- ===== ФОТОГРАФИИ ===== -->
<div class="form-group">
    <label>Фотографии (макс. 5)</label>
    <div class="photo-upload-container">
        <input type="file" id="adPhotos" accept="image/*" multiple style="display: none;">
        <button type="button" class="upload-btn" onclick="document.getElementById('adPhotos').click()">
            📷 Выбрать фото
        </button>
        <div class="photo-preview-grid" id="photoPreview"></div>
        <p class="photo-hint">Нажмите на фото, чтобы удалить</p>
    </div>
</div>

        <!-- ===== Дополнительные поля для машин ===== -->
        <div id="carFields" class="extra-fields hidden">

            <!-- Пробег + Прошивка -->
            <div class="car-row-2">
                <div class="form-group">
                    <label>Пробег</label>
                    <select id="carMileage">
                        <option value="">Выберите</option>
                        <option value="0-10">До 10 000 км</option>
                        <option value="10-50">10 — 50 тыс. км</option>
                        <option value="50-100">50 — 100 тыс. км</option>
                        <option value="100+">Более 100 тыс. км</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Прошивка</label>
                    <select id="carFirmware">
                        <option value="">Выберите</option>
                        <option value="stock">Сток</option>
                        <option value="drift">Дрифт</option>
                        <option value="comfort+">Комфорт+</option>
                        <option value="sport">Спорт</option>
                        <option value="sport+">Спорт+</option>
                    </select>
                </div>
            </div>

            <!-- Свет -->
            <div class="form-group">
                <label>Свет</label>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn" data-group="lights" data-value="underglow" onclick="toggleCarBtn(this)">
                        💡 Подсветка
                    </button>
                    <button type="button" class="toggle-btn" data-group="lights" data-value="highbeam" onclick="toggleCarBtn(this)">
                        🔆 Дальний свет
                    </button>
                    <button type="button" class="toggle-btn" data-group="lights" data-value="strobe" onclick="toggleCarBtn(this)">
                        🔴 Стробоскопы
                    </button>
                </div>
                <!-- Скрытые поля для совместимости -->
                <input type="hidden" id="hasUnderglow" value="false">
                <input type="hidden" id="hasHighBeam" value="false">
                <input type="hidden" id="hasStrobe" value="false">
                <div id="underglowOptions" class="car-sub-options hidden">
                    <label class="sub-label">Позиции подсветки:</label>
                    <div class="toggle-group">
                        <button type="button" class="toggle-btn small" data-group="underglow" data-value="bottom" onclick="toggleCarBtn(this)">Нижняя</button>
                        <button type="button" class="toggle-btn small" data-group="underglow" data-value="left" onclick="toggleCarBtn(this)">Левая</button>
                        <button type="button" class="toggle-btn small" data-group="underglow" data-value="right" onclick="toggleCarBtn(this)">Правая</button>
                    </div>
                </div>
                <div id="strobeOptions" class="car-sub-options hidden">
                    <label class="sub-label">Тип стробоскопов:</label>
                    <div class="toggle-group">
                        <button type="button" class="toggle-btn small single" data-group="strobe-type" data-value="donate" onclick="selectCarBtn(this)">Донатные</button>
                        <button type="button" class="toggle-btn small single" data-group="strobe-type" data-value="regular" onclick="selectCarBtn(this)">Обычные</button>
                    </div>
                    <input type="hidden" id="strobeTypeHidden" value="">
                </div>
            </div>

            <!-- Подвеска -->
            <div class="form-group">
                <label>Подвеска</label>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn" data-group="suspension" data-value="hydraulic" onclick="toggleCarBtn(this)">
                        🔧 Гидравлика
                    </button>
                    <button type="button" class="toggle-btn" data-group="suspension" data-value="pneumatic" onclick="toggleCarBtn(this)">
                        💨 Пневма
                    </button>
                </div>
            </div>

            <!-- Опции есть/нет -->
            <div class="form-group">
                <label>Дополнительно</label>
                <div class="yes-no-grid">
                    <div class="yes-no-item">
                        <span class="yes-no-label">Шинка</span>
                        <div class="yes-no-btns">
                            <button type="button" class="yn-btn" data-field="carTires" data-value="yes" onclick="selectYesNo(this)">Есть</button>
                            <button type="button" class="yn-btn" data-field="carTires" data-value="no" onclick="selectYesNo(this)">Нет</button>
                        </div>
                        <input type="hidden" id="carTires" value="">
                    </div>
                    <div class="yes-no-item">
                        <span class="yes-no-label">Клиренс</span>
                        <div class="yes-no-btns">
                            <button type="button" class="yn-btn" data-field="carClearance" data-value="yes" onclick="selectYesNo(this)">Есть</button>
                            <button type="button" class="yn-btn" data-field="carClearance" data-value="no" onclick="selectYesNo(this)">Нет</button>
                        </div>
                        <input type="hidden" id="carClearance" value="">
                    </div>
                    <div class="yes-no-item">
                        <span class="yes-no-label">Лаунч</span>
                        <div class="yes-no-btns">
                            <button type="button" class="yn-btn" data-field="carLaunch" data-value="yes" onclick="selectYesNo(this)">Есть</button>
                            <button type="button" class="yn-btn" data-field="carLaunch" data-value="no" onclick="selectYesNo(this)">Нет</button>
                        </div>
                        <input type="hidden" id="carLaunch" value="">
                    </div>
                    <div class="yes-no-item">
                        <span class="yes-no-label">ПДВ</span>
                        <div class="yes-no-btns">
                            <button type="button" class="yn-btn" data-field="carPDV" data-value="yes" onclick="selectYesNo(this)">Есть</button>
                            <button type="button" class="yn-btn" data-field="carPDV" data-value="no" onclick="selectYesNo(this)">Нет</button>
                        </div>
                        <input type="hidden" id="carPDV" value="">
                    </div>
                    <div class="yes-no-item">
                        <span class="yes-no-label">Антирадар</span>
                        <div class="yes-no-btns">
                            <button type="button" class="yn-btn" data-field="carAntiradar" data-value="yes" onclick="selectYesNo(this)">Есть</button>
                            <button type="button" class="yn-btn" data-field="carAntiradar" data-value="no" onclick="selectYesNo(this)">Нет</button>
                        </div>
                        <input type="hidden" id="carAntiradar" value="">
                    </div>
                </div>
            </div>

        </div>

        <!-- ===== Дополнительные поля для домов ===== -->
        <div id="houseFields" class="extra-fields hidden">
            
            <div class="form-group">
                <label>Расположение</label>
                <select id="houseLocation">
                    <option value="">Выберите расположение</option>
                    <option value="Арзамас">Арзамас</option>
                    <option value="Батырево">Батырево</option>
                    <option value="Лыткарино">Лыткарино</option>
                    <option value="Южный">Южный</option>
                    <option value="Нижегородск">Нижегородск</option>
                </select>
            </div>

            <div class="form-group">
                <label>Улучшения дома</label>
                <select id="houseUpgrades">
                    <option value="">Выберите уровень</option>
                    <option value="1/5">1/5</option>
                    <option value="2/5">2/5</option>
                    <option value="3/5">3/5</option>
                    <option value="4/5">4/5</option>
                    <option value="5/5">5/5</option>
                </select>
            </div>

            <div class="form-group">
                <label>Улучшения подвала</label>
                <select id="houseBasement">
                    <option value="">Выберите уровень</option>
                    <option value="1/5">1/5</option>
                    <option value="2/5">2/5</option>
                    <option value="3/5">3/5</option>
                    <option value="4/5">4/5</option>
                    <option value="5/5">5/5</option>
                </select>
            </div>

        </div>

        <!-- ===== Дополнительные поля для гаражей ===== -->
        <div id="garageFields" class="extra-fields hidden">
            
            <div class="form-group">
                <label>Расположение</label>
                <select id="garageLocation">
                    <option value="">Выберите расположение</option>
                    <option value="Арзамас">Арзамас</option>
                    <option value="Батырево">Батырево</option>
                    <option value="Лыткарино">Лыткарино</option>
                    <option value="Южный">Южный</option>
                    <option value="Нижегородск">Нижегородск</option>
                </select>
            </div>

            <div class="form-group">
                <label>Улучшения</label>
                <select id="garageUpgrades">
                    <option value="">Выберите уровень</option>
                    <option value="1/5">1/5</option>
                    <option value="2/5">2/5</option>
                    <option value="3/5">3/5</option>
                    <option value="4/5">4/5</option>
                    <option value="5/5">5/5</option>
                </select>
            </div>

        </div>

        <!-- ===== Дополнительные поля для бизнесов ===== -->
        <div id="businessFields" class="extra-fields hidden">
            
            <div class="form-group">
                <label>Категория бизнеса</label>
                <select id="businessCategory">
                    <option value="">Выберите категорию</option>
                    <option value="247">Магазин 24/7</option>
                    <option value="gas">АЗС</option>
                    <option value="sk">СК</option>
                    <option value="tk">ТК</option>
                    <option value="ammo">Амуниция</option>
                    <option value="accessories">Аксессуары</option>
                    <option value="clothes">Одежда</option>
                    <option value="workshop">Мастерская</option>
                    <option value="pvz">ПВЗ</option>
                    <option value="fishing">Рыболовный магазин</option>
                    <option value="sto">СТО</option>
                    <option value="techcenter">Тех. центр</option>
                    <option value="snackbar">Закусочная</option>
                    <option value="club">Клуб</option>
                    <option value="taxi">Такси</option>
                    <option value="styling">Стайлинг центр</option>
                    <option value="tireshop">Шиномонтаж</option>
                </select>
            </div>

            <div class="form-group">
                <label>Расположение</label>
                <select id="businessLocation">
                    <option value="">Выберите расположение</option>
                    <option value="Арзамас">Арзамас</option>
                    <option value="Батырево">Батырево</option>
                    <option value="Лыткарино">Лыткарино</option>
                    <option value="Южный">Южный</option>
                    <option value="Нижегородск">Нижегородск</option>
                </select>
            </div>

            <div class="form-group">
                <label>Финансовая статистика (₽/день)</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="businessIncomeFrom" placeholder="От" style="flex: 1;">
                    <span style="color: #888;">—</span>
                    <input type="number" id="businessIncomeTo" placeholder="До" style="flex: 1;">
                </div>
                <p class="input-hint">Примерный доход в день</p>
            </div>

        </div>

        <!-- Контакты -->
<div class="form-group">
    <label>Telegram для связи</label>
    <div class="telegram-input-wrapper">
        <span class="telegram-prefix">@</span>
        <input type="text" id="adContact" placeholder="username">
    </div>
    <p class="input-hint">Без @ в начале, только никнейм</p>
</div>

        <!-- Кнопка создания -->
        <button type="submit" class="submit-ad-btn">Опубликовать</button>
    </form>
</div>

<script type="module" src="firebase-config.js"></script>

// Показываем/скрываем поле выбора марки в зависимости от категории
const _origCatChange = window.onCategoryChange;
document.addEventListener('DOMContentLoaded', () => {
    const catSelect = document.getElementById('adCategory');
    if (catSelect) {
        catSelect.addEventListener('change', () => {
            const isCar = ['cars','moto','trucks'].includes(catSelect.value);
            document.getElementById('titleGroup').classList.toggle('hidden', isCar);
            document.getElementById('carModelGroup').classList.toggle('hidden', !isCar);
            if (!isCar) {
                document.getElementById('carModelValue').value = '';
                document.getElementById('carModelSelected').classList.add('hidden');
                document.getElementById('carModelSearch').value = '';
            }
        });
    }

    // Закрываем dropdown при клике вне
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#carModelGroup')) {
            document.getElementById('carModelDropdown')?.classList.add('hidden');
        }
    });
});

window.filterCarModels = function(query) {
    const dropdown = document.getElementById('carModelDropdown');
    const input    = document.getElementById('carModelSearch');
    const q = query.toLowerCase().trim();
    if (q.length < 1) { dropdown.classList.add('hidden'); return; }

    const matches = ALL_VEHICLES.filter(v => v.toLowerCase().includes(q)).slice(0, 12);
    if (!matches.length) { dropdown.classList.add('hidden'); return; }

    dropdown.innerHTML = matches.map(v =>
        `<div class="car-model-option" onclick="selectCarModel('${v.replace(/'/g, "\\'")}')">
            <span>${v}</span>
        </div>`
    ).join('');

    dropdown.classList.remove('hidden');
};

// Клик вне дропдауна — закрываем
document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('carModelDropdown');
    const input    = document.getElementById('carModelSearch');
    if (!dropdown.contains(e.target) && e.target !== input) {
        dropdown.classList.add('hidden');
    }
});

window.selectCarModel = function(name) {
    document.getElementById('carModelValue').value = name;
    document.getElementById('carModelSearch').value = name;
    document.getElementById('carModelDropdown').classList.add('hidden');
    const sel = document.getElementById('carModelSelected');
    sel.innerHTML = `<span class="selected-model-badge">✓ ${name} <button type="button" onclick="clearCarModel()" style="background:none;border:none;color:#888;cursor:pointer;margin-left:4px;">×</button></span>`;
    sel.classList.remove('hidden');
    // Подставляем в adTitle тоже
    const titleInput = document.getElementById('adTitle');
    if (titleInput) titleInput.value = name;
};

window.clearCarModel = function() {
    document.getElementById('carModelValue').value = '';
    document.getElementById('carModelSearch').value = '';
    document.getElementById('carModelSelected').classList.add('hidden');
    const titleInput = document.getElementById('adTitle');
    if (titleInput) titleInput.value = '';
};
