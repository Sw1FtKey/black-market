<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика — Black Market</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; background: #0b0b0b; padding: 40px 20px;" class="stats-page-wrapper">
    <a href="index.html" class="back-button">← Назад</a>
    
    <div style="max-width: 1200px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 32px; color: #ff1e1e; margin-bottom: 10px;">📊 Статистика продавца</h1>
            <p style="color: #888;">Анализ ваших объявлений и активности</p>
        </div>
        
        <!-- Карточки статистики -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div style="background: rgba(17,17,17,0.95); border: 1px solid rgba(255,30,30,0.2); border-radius: 16px; padding: 25px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 15px;">👁</div>
                <div id="totalViews" style="font-size: 36px; font-weight: bold; color: white; margin-bottom: 5px;">0</div>
                <div style="color: #888; font-size: 14px;">Всего просмотров</div>
            </div>
            
            <div style="background: rgba(17,17,17,0.95); border: 1px solid rgba(255,30,30,0.2); border-radius: 16px; padding: 25px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 15px;">⭐</div>
                <div id="totalFavorites" style="font-size: 36px; font-weight: bold; color: white; margin-bottom: 5px;">0</div>
                <div style="color: #888; font-size: 14px;">В избранном</div>
            </div>
            
            <div style="background: rgba(17,17,17,0.95); border: 1px solid rgba(255,30,30,0.2); border-radius: 16px; padding: 25px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 15px;">💬</div>
                <div id="totalMessages" style="font-size: 36px; font-weight: bold; color: white; margin-bottom: 5px;">0</div>
                <div style="color: #888; font-size: 14px;">Сообщений</div>
            </div>
            
            <div style="background: rgba(17,17,17,0.95); border: 1px solid rgba(255,30,30,0.2); border-radius: 16px; padding: 25px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 15px;">📈</div>
                <div id="conversionRate" style="font-size: 36px; font-weight: bold; color: white; margin-bottom: 5px;">0%</div>
                <div style="color: #888; font-size: 14px;">Конверсия</div>
            </div>
        </div>
        
        <!-- Топ объявлений -->
        <div style="background: rgba(17,17,17,0.95); border: 1px solid rgba(255,30,30,0.2); border-radius: 16px; padding: 25px;">
            <h3 style="color: white; font-size: 18px; margin-bottom: 20px;">🏆 Топ объявлений</h3>
            <div id="topAdsList">
                <div style="text-align: center; padding: 40px; color: #666;">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="error-logger.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="stats.js"></script>
</body>
</html>
